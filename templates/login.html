{% extends "base.html" %}
{% block title %}ChainML — Login{% endblock %}
{% block content %}
<style>.auth-wrap{max-width:420px;margin:2rem auto;}</style>
<div class="auth-wrap">
  <div class="ph"><div class="ph-eye">⬡ Access</div><h1>Login</h1></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <div class="card">
    <form method="POST">
      <div class="fg"><label>Username or Email</label><input class="input" type="text" name="identifier" placeholder="username or email" value="{{ request.form.get('identifier','') }}" required autofocus></div>
      <div class="fg"><label>Password</label><input class="input" type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Login</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.83rem;color:var(--muted);">No account? <a href="/register" style="color:var(--accent2);">Register</a></p>
  </div>
</div>
{% endblock %}
