{% extends "base.html" %}
{% block title %}ChainML — Register{% endblock %}
{% block content %}
<div style="max-width:460px;margin:2rem auto;">
  <div class="ph"><div class="ph-eye">Join the Network</div><h1>Create Account</h1></div>
  {% if error %}<div class="cml-alert cml-alert-error"><i class="bi bi-exclamation-triangle-fill"></i>{{ error }}</div>{% endif %}
  <div class="cml-card">
    <form method="POST">
      <div class="cml-fg">
        <label class="cml-label"><i class="bi bi-person me-1"></i>Username</label>
        <input class="cml-input" type="text" name="username" placeholder="at least 3 characters" value="{{ request.form.get('username','') }}" required autofocus>
      </div>
      <div class="cml-fg">
        <label class="cml-label"><i class="bi bi-envelope me-1"></i>Email</label>
        <input class="cml-input" type="email" name="email" placeholder="you@example.com" value="{{ request.form.get('email','') }}" required>
      </div>
      <div class="cml-fg">
        <label class="cml-label"><i class="bi bi-lock me-1"></i>Password</label>
        <input class="cml-input" type="password" name="password" placeholder="at least 6 characters" required>
      </div>
      <div class="cml-fg">
        <label class="cml-label"><i class="bi bi-lock-fill me-1"></i>Confirm Password</label>
        <input class="cml-input" type="password" name="confirm" required>
      </div>
      <button type="submit" class="cml-btn cml-btn-primary w-100 justify-content-center mt-1">
        <i class="bi bi-rocket-takeoff-fill"></i> Create Account
      </button>
    </form>
    <div class="glow-divider"></div>
    <p style="text-align:center;font-size:.85rem;color:var(--text2)">
      Already have an account? <a href="/login" style="color:var(--blue2);text-decoration:none;font-weight:600">Login</a>
    </p>
  </div>
</div>
{% endblock %}
