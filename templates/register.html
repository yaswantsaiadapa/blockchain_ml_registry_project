{% extends "base.html" %}
{% block title %}ChainML — Register{% endblock %}
{% block content %}
<style>.auth-wrap{max-width:420px;margin:2rem auto;}</style>
<div class="auth-wrap">
  <div class="ph"><div class="ph-eye">⬡ Join</div><h1>Create Account</h1></div>
  {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
  <div class="card">
    <form method="POST">
      <div class="fg"><label>Username</label><input class="input" type="text" name="username" placeholder="at least 3 characters" value="{{ request.form.get('username','') }}" required autofocus></div>
      <div class="fg"><label>Email</label><input class="input" type="email" name="email" placeholder="you@example.com" value="{{ request.form.get('email','') }}" required></div>
      <div class="fg"><label>Password</label><input class="input" type="password" name="password" placeholder="at least 6 characters" required></div>
      <div class="fg"><label>Confirm Password</label><input class="input" type="password" name="confirm" placeholder="repeat password" required></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Create Account</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.83rem;color:var(--muted);">Already have an account? <a href="/login" style="color:var(--accent2);">Login</a></p>
  </div>
</div>
{% endblock %}
