<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ChainML{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --danger: #f43f5e;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent2); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent); bottom: -50px; left: -50px; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      height: 60px;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 2px;
      margin-right: auto;
    }

    .nav-logo span { color: var(--accent2); }

    nav a {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active {
      color: var(--accent);
      background: rgba(0,229,255,0.08);
    }

    /* MAIN */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.4rem;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #33eaff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,229,255,0.3); }
    .btn-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
    }
    .btn-ghost:hover { background: rgba(0,229,255,0.1); }
    .btn-purple {
      background: var(--accent2);
      color: #fff;
    }
    .btn-purple:hover { background: #8b5cf6; transform: translateY(-1px); }
    .btn-green {
      background: var(--accent3);
      color: #000;
    }
    .btn-green:hover { background: #34d399; transform: translateY(-1px); }

    /* INPUTS */
    .input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.1); }
    .input::placeholder { color: var(--muted); }

    label {
      display: block;
      font-size: 0.7rem;
      font-family: var(--mono);
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .form-group { margin-bottom: 1.2rem; }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .badge-green { background: rgba(16,185,129,0.15); color: var(--accent3); border: 1px solid rgba(16,185,129,0.3); }
    .badge-red { background: rgba(244,63,94,0.15); color: var(--danger); border: 1px solid rgba(244,63,94,0.3); }
    .badge-blue { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
    .badge-purple { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }

    /* PAGE HEADER */
    .page-header {
      margin-bottom: 2.5rem;
    }
    .page-header .eyebrow {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .page-header h1 {
      font-family: var(--sans);
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.1;
      color: var(--text);
    }
    .page-header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* HASH DISPLAY */
    .hash {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
      background: var(--surface);
      padding: 0.4rem 0.6rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    /* ALERT */
    .alert {
      padding: 1rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .alert-error { background: rgba(244,63,94,0.1); border: 1px solid rgba(244,63,94,0.3); color: var(--danger); }
    .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--accent3); }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      nav a { display: none; }
      nav a.mobile-show { display: block; }
      main { padding: 1.5rem 1rem; }
    }

    select.input option { background: var(--card); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav>
    <a href="/" class="nav-logo">CHAIN<span>ML</span></a>
    <a href="/" {% if request.endpoint == 'home' %}class="active"{% endif %}>Home</a>
    <a href="/train" {% if request.endpoint == 'train' %}class="active"{% endif %}>Train</a>
    <a href="/chain" {% if request.endpoint == 'chain' %}class="active"{% endif %}>Chain</a>
    <a href="/verify" {% if request.endpoint == 'verify' %}class="active"{% endif %}>Verify</a>
    <a href="/best" {% if request.endpoint == 'best' %}class="active"{% endif %}>Best</a>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
