<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}ChainML{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
  --bg:       #020817;
  --bg2:      #040d21;
  --surface:  #071128;
  --card:     #080f1f;
  --border:   #0e2045;
  --border2:  #1a3560;
  --gold:     #f0b429;
  --gold2:    #ffd166;
  --blue:     #0ea5e9;
  --blue2:    #38bdf8;
  --blue3:    #0369a1;
  --accent:   #3b82f6;
  --green:    #10b981;
  --red:      #ef4444;
  --text:     #e2e8f0;
  --text2:    #94a3b8;
  --muted:    #475569;
  --orb:      'Orbitron', sans-serif;
  --raj:      'Rajdhani', sans-serif;
  --grotesk:  'Space Grotesk', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--grotesk);
  min-height: 100vh;
  overflow-x: hidden;
}

/* animated bg grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(14,165,233,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(14,165,233,.04) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 40% at 15% 0%, rgba(14,165,233,.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 85% 100%, rgba(240,180,41,.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── NAVBAR ─────────────────────────────────────────────────────────────────── */
.chainml-nav {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(2, 8, 23, 0.92);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border2);
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 2rem;
  gap: 1.5rem;
}

.nav-brand {
  font-family: var(--orb);
  font-size: 1.1rem;
  font-weight: 900;
  letter-spacing: 3px;
  text-decoration: none;
  background: linear-gradient(135deg, var(--blue2), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-right: auto;
  flex-shrink: 0;
}

.nav-link-item {
  font-family: var(--raj);
  font-size: .8rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  text-decoration: none;
  padding: .35rem .7rem;
  border-radius: 5px;
  transition: all .2s;
  white-space: nowrap;
}
.nav-link-item:hover, .nav-link-item.active {
  color: var(--blue2);
  background: rgba(14,165,233,.08);
}

.nav-user-badge {
  font-family: var(--orb);
  font-size: .6rem;
  color: var(--gold);
  letter-spacing: 1px;
  border: 1px solid rgba(240,180,41,.3);
  background: rgba(240,180,41,.06);
  padding: .3rem .75rem;
  border-radius: 20px;
  white-space: nowrap;
}

.btn-nav-register {
  font-family: var(--raj);
  font-size: .75rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: .38rem 1rem;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--blue3), var(--accent));
  color: #fff;
  border: none;
  text-decoration: none;
  transition: all .2s;
  box-shadow: 0 0 16px rgba(59,130,246,.3);
}
.btn-nav-register:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 24px rgba(59,130,246,.5);
  color: #fff;
}

/* ── SUBNAV ──────────────────────────────────────────────────────────────────── */
.chainml-subnav {
  background: rgba(4,13,33,.9);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 2rem;
  overflow-x: auto;
  scrollbar-width: none;
  position: relative;
  z-index: 1;
}
.chainml-subnav::-webkit-scrollbar { display: none; }

.subnav-label {
  font-family: var(--raj);
  font-size: .65rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: .7rem 1rem .7rem 0;
  border-right: 1px solid var(--border2);
  margin-right: .5rem;
  white-space: nowrap;
  flex-shrink: 0;
}
.subnav-label span { color: var(--gold); }

.subnav-tab {
  font-family: var(--raj);
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  padding: .75rem .9rem;
  border-bottom: 2px solid transparent;
  transition: all .15s;
  white-space: nowrap;
}
.subnav-tab:hover { color: var(--text); }
.subnav-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}

/* ── MAIN ────────────────────────────────────────────────────────────────────── */
main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}

/* ── PAGE HEADER ─────────────────────────────────────────────────────────────── */
.ph { margin-bottom: 2.2rem; }
.ph-eye {
  font-family: var(--raj);
  font-size: .65rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--blue2);
  margin-bottom: .5rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.ph-eye::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--blue2);
}
.ph h1 {
  font-family: var(--orb);
  font-size: 2rem;
  font-weight: 700;
  line-height: 1.15;
  background: linear-gradient(135deg, #fff 40%, var(--blue2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.ph p { color: var(--text2); font-size: .92rem; margin-top: .5rem; line-height: 1.6; }

/* ── CARDS ───────────────────────────────────────────────────────────────────── */
.cml-card {
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 1.6rem;
  position: relative;
  overflow: hidden;
}
.cml-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--blue), var(--gold), transparent);
  opacity: .3;
}

/* ── BUTTONS ─────────────────────────────────────────────────────────────────── */
.cml-btn {
  display: inline-flex;
  align-items: center;
  gap: .45rem;
  padding: .6rem 1.3rem;
  border-radius: 7px;
  font-family: var(--raj);
  font-size: .78rem;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  text-decoration: none;
  border: none;
  transition: all .22s;
}
.cml-btn-primary {
  background: linear-gradient(135deg, var(--blue3), var(--accent));
  color: #fff;
  box-shadow: 0 0 20px rgba(59,130,246,.25);
}
.cml-btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(59,130,246,.45);
  color: #fff;
}
.cml-btn-gold {
  background: linear-gradient(135deg, #b45309, var(--gold));
  color: #000;
  box-shadow: 0 0 20px rgba(240,180,41,.2);
}
.cml-btn-gold:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 30px rgba(240,180,41,.4);
  color: #000;
}
.cml-btn-ghost {
  background: transparent;
  color: var(--blue2);
  border: 1px solid rgba(14,165,233,.35);
}
.cml-btn-ghost:hover {
  background: rgba(14,165,233,.07);
  border-color: var(--blue2);
  color: var(--blue2);
}
.cml-btn-red {
  background: linear-gradient(135deg, #991b1b, var(--red));
  color: #fff;
}
.cml-btn-red:hover { transform: translateY(-1px); color: #fff; }
.cml-btn-sm { padding: .35rem .8rem; font-size: .68rem; }

/* ── FORM INPUTS ─────────────────────────────────────────────────────────────── */
.cml-label {
  display: block;
  font-family: var(--raj);
  font-size: .65rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: .45rem;
}
.cml-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 7px;
  padding: .75rem 1rem;
  color: var(--text);
  font-family: var(--grotesk);
  font-size: .88rem;
  outline: none;
  transition: all .2s;
}
.cml-input:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(14,165,233,.12);
}
.cml-input::placeholder { color: var(--muted); }
select.cml-input option { background: var(--card); }
textarea.cml-input { resize: vertical; min-height: 90px; }
.cml-fg { margin-bottom: 1.2rem; }

/* ── ALERTS ──────────────────────────────────────────────────────────────────── */
.cml-alert {
  padding: .9rem 1.2rem;
  border-radius: 9px;
  font-size: .88rem;
  margin-bottom: 1.3rem;
  display: flex;
  align-items: center;
  gap: .6rem;
}
.cml-alert-error   { background: rgba(239,68,68,.07);  border: 1px solid rgba(239,68,68,.25);  color: #fca5a5; }
.cml-alert-success { background: rgba(16,185,129,.07); border: 1px solid rgba(16,185,129,.25); color: #6ee7b7; }
.cml-alert-info    { background: rgba(14,165,233,.07); border: 1px solid rgba(14,165,233,.2);  color: #7dd3fc; }

/* ── HASH DISPLAY ────────────────────────────────────────────────────────────── */
.hash-box {
  font-family: 'Courier New', monospace;
  font-size: .6rem;
  color: var(--text2);
  word-break: break-all;
  background: rgba(4,13,33,.8);
  padding: .5rem .8rem;
  border-radius: 5px;
  border: 1px solid var(--border);
  letter-spacing: .5px;
}
.hash-lbl {
  font-family: var(--raj);
  font-size: .6rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin: .8rem 0 .3rem;
}

/* ── BADGES ──────────────────────────────────────────────────────────────────── */
.cml-badge {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  padding: .2rem .6rem;
  border-radius: 20px;
  font-family: var(--raj);
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.badge-live   { background: rgba(16,185,129,.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,.3); }
.badge-mock   { background: rgba(240,180,41,.1);  color: var(--gold); border: 1px solid rgba(240,180,41,.3); }
.badge-blue   { background: rgba(14,165,233,.1);  color: var(--blue2); border: 1px solid rgba(14,165,233,.25); }
.badge-gold   { background: rgba(240,180,41,.1);  color: var(--gold); border: 1px solid rgba(240,180,41,.25); }
.badge-reg    { background: rgba(168,85,247,.1);  color: #d8b4fe; border: 1px solid rgba(168,85,247,.25); }
.badge-cls    { background: rgba(14,165,233,.1);  color: var(--blue2); border: 1px solid rgba(14,165,233,.25); }
.badge-red    { background: rgba(239,68,68,.1);   color: #fca5a5; border: 1px solid rgba(239,68,68,.25); }

/* ── ETH LINK ────────────────────────────────────────────────────────────────── */
.eth-link {
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-family: var(--raj);
  font-size: .7rem;
  font-weight: 600;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid rgba(240,180,41,.25);
  background: rgba(240,180,41,.06);
  padding: .3rem .7rem;
  border-radius: 5px;
  transition: all .2s;
  letter-spacing: 1px;
}
.eth-link:hover {
  background: rgba(240,180,41,.12);
  color: var(--gold2);
}

/* ── TABLE ───────────────────────────────────────────────────────────────────── */
.cml-table { width: 100%; border-collapse: collapse; }
.cml-table th {
  font-family: var(--raj);
  font-size: .62rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  padding: .7rem 1rem;
  border-bottom: 1px solid var(--border2);
  text-align: left;
  background: rgba(4,13,33,.5);
}
.cml-table td {
  padding: .85rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: .88rem;
  vertical-align: middle;
}
.cml-table tr:last-child td { border-bottom: none; }
.cml-table tr:hover td { background: rgba(14,165,233,.03); }

/* ── METRIC PILLS ────────────────────────────────────────────────────────────── */
.metric-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .5rem; }
.metric-pill {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: .28rem .7rem;
  font-family: var(--raj);
  font-size: .65rem;
  color: var(--text2);
  letter-spacing: 1px;
}
.metric-pill span { color: var(--blue2); font-weight: 700; }

/* ── DIVIDER ─────────────────────────────────────────────────────────────────── */
.glow-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), var(--blue3), var(--border2), transparent);
  margin: 1.5rem 0;
}

@media (max-width: 768px) {
  .chainml-nav { padding: 0 1rem; gap: .75rem; }
  .nav-link-item { display: none; }
  main { padding: 1.5rem 1rem; }
  .ph h1 { font-size: 1.6rem; }
}
</style>
</head>
<body>

<nav class="chainml-nav">
  <a href="/" class="nav-brand">CHAIN<span style="color:var(--gold)">ML</span></a>
  <a href="/" class="nav-link-item {% if request.endpoint=='home' %}active{% endif %}">
    <i class="bi bi-grid-3x3-gap me-1"></i>Projects
  </a>
  {% if current_user %}
  <a href="/profile" class="nav-link-item {% if request.endpoint=='profile' %}active{% endif %}">
    <i class="bi bi-person-circle me-1"></i>Profile
  </a>
  <a href="/projects/new" class="nav-link-item">
    <i class="bi bi-plus-lg me-1"></i>New Project
  </a>
  <span class="nav-user-badge"><i class="bi bi-hexagon-fill me-1"></i>{{ current_user.username }}</span>
  <a href="/logout" class="nav-link-item"><i class="bi bi-box-arrow-right me-1"></i>Logout</a>
  {% else %}
  <a href="/login" class="nav-link-item {% if request.endpoint=='login' %}active{% endif %}">Login</a>
  <a href="/register" class="btn-nav-register">Register</a>
  {% endif %}
</nav>

{% block subnav %}{% endblock %}

<main>{% block content %}{% endblock %}</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
