<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}ChainML{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --card: #16161f;
      --border: #2a2a3a;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --accent3: #10b981;
      --danger: #f43f5e;
      --gold: #f59e0b;
      --text: #e2e8f0;
      --muted: #64748b;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }
    .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; }
    .orb-1 { width: 400px; height: 400px; background: var(--accent2); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent); bottom: -50px; left: -50px; }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.88);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex; align-items: center; gap: 1.2rem;
      height: 56px;
    }
    .nav-logo { font-family: var(--mono); font-size: 0.95rem; font-weight: 700; color: var(--accent); text-decoration: none; letter-spacing: 2px; margin-right: auto; }
    .nav-logo span { color: var(--accent2); }
    nav a.nav-link { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 1px; text-transform: uppercase; padding: 0.3rem 0.6rem; border-radius: 4px; transition: all 0.2s; }
    nav a.nav-link:hover, nav a.nav-link.active { color: var(--accent); background: rgba(0,229,255,0.08); }

    main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem; }

    /* SUBNAV for project pages */
    .subnav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex; align-items: center; gap: 0;
      position: relative; z-index: 90;
    }
    .subnav-project { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); padding: 0.7rem 1rem 0.7rem 0; border-right: 1px solid var(--border); margin-right: 0.5rem; letter-spacing: 1px; }
    .subnav-project span { color: var(--accent); }
    .subnav a { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); text-decoration: none; padding: 0.75rem 0.9rem; border-bottom: 2px solid transparent; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
    .subnav a:hover { color: var(--text); }
    .subnav a.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* CARDS */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.3; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.65rem 1.3rem; border-radius: 6px; font-family: var(--mono); font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; text-decoration: none; border: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #33eaff; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,229,255,0.3); }
    .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-ghost:hover { background: rgba(0,229,255,0.08); }
    .btn-purple { background: var(--accent2); color: #fff; }
    .btn-purple:hover { background: #8b5cf6; transform: translateY(-1px); }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.68rem; }

    /* INPUTS */
    .input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.7rem 1rem; color: var(--text); font-family: var(--mono); font-size: 0.85rem; outline: none; transition: border-color 0.2s; }
    .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
    .input::placeholder { color: var(--muted); }
    label { display: block; font-size: 0.68rem; font-family: var(--mono); letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.45rem; }
    .form-group { margin-bottom: 1.1rem; }

    /* PAGE HEADER */
    .page-header { margin-bottom: 2rem; }
    .page-header .eyebrow { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 0.4rem; }
    .page-header h1 { font-size: 2.2rem; font-weight: 800; line-height: 1.1; }
    .page-header p { margin-top: 0.4rem; color: var(--muted); font-size: 0.9rem; }

    /* HASH */
    .hash { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); word-break: break-all; background: var(--surface); padding: 0.4rem 0.6rem; border-radius: 4px; border: 1px solid var(--border); }

    /* ALERTS */
    .alert { padding: 0.9rem 1.1rem; border-radius: 8px; font-size: 0.88rem; margin-bottom: 1.2rem; }
    .alert-error { background: rgba(244,63,94,0.08); border: 1px solid rgba(244,63,94,0.25); color: var(--danger); }
    .alert-success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: var(--accent3); }

    select.input option { background: var(--card); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav>
    <a href="/" class="nav-logo">CHAIN<span>ML</span></a>
    <a href="/" class="nav-link {% if request.endpoint == 'home' %}active{% endif %}">Projects</a>
    <a href="/projects/new" class="nav-link {% if request.endpoint == 'new_project' %}active{% endif %}">+ New Project</a>
  </nav>

  {% block subnav %}{% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
